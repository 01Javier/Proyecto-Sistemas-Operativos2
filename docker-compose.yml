version: '3.9'

services:

  postgres:
    image: postgres:17-alpine

    environment:
      POSTGRES_DB: jvmc_project_9
      POSTGRES_USER: usrmvc
      POSTGRES_PASSWORD: Admin$2025

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./Backend

    depends_on:
      - postgres

    ports:
      - "9090:9090"

  frontend:
    build: ./Frontend

    ports:
      - "4200:80"

volumes:
  postgres_data:

