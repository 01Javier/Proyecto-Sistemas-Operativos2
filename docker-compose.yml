version: '3.9'

services:

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: jvmc_project_9
      POSTGRES_USER: usrmvc
      POSTGRES_PASSWORD: Admin$2025

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./Backend

    depends_on:
      - postgres

    expose:
      - "9090"

  frontend:
    build: ./Frontend

    expose:
      - "80"

  nginx:
    build: ./nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
