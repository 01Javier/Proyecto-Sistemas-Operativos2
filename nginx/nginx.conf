events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    log_format lb_log '$remote_addr - [$time_local] "$request" '
                      'status=$status upstream=$upstream_addr '
                      'response_time=${upstream_response_time}s';

    access_log /var/log/nginx/access.log lb_log;

    server {
        listen 80;

        add_header X-Upstream-Addr $upstream_addr always;
        add_header X-Served-By $hostname always;
        add_header X-Response-Time $upstream_response_time always;

        location /api/ {
            set $backend "backend:9090";
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://$backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        location / {
            set $frontend "frontend:80";
            proxy_pass http://$frontend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}