events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=5s ipv6=off;

    log_format lb_log '$remote_addr - [$time_local] "$request" '
                      'status=$status upstream=$upstream_addr '
                      'response_time=$upstream_response_time';

    access_log /var/log/nginx/access.log lb_log;

    server {
        listen 80;
        server_name proyectosiso2.ddns.net;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name proyectosiso2.ddns.net;

        ssl_certificate /etc/letsencrypt/live/proyectosiso2.ddns.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/proyectosiso2.ddns.net/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        add_header X-Upstream-Addr $upstream_addr always;
        add_header X-Served-By $hostname always;
        add_header X-Response-Time $upstream_response_time always;

        location /api/ {
            set $backend "tasks.backend:9090";
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://$backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        location / {
            set $frontend "tasks.frontend:80";
            proxy_pass http://$frontend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }
    }
}