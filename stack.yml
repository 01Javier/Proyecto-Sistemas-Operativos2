version: '3.9'

services:

  postgres:
    image: postgres:17-alpine

    environment:
      POSTGRES_DB: jvmc_project_9
      POSTGRES_USER: usrmvc
      POSTGRES_PASSWORD: Admin$2025

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - appnet

  backend:
    image: tuusuario/alm09:1.0

    networks:
      - appnet

    deploy:
      replicas: 2

  frontend:
    image: tuusuario/angularpp3:1.0

    networks:
      - appnet

    deploy:
      replicas: 2

volumes:
  postgres_data:

networks:
  appnet: