<div class="registro-wrapper d-flex align-items-center justify-content-center min-vh-100">
  <div class="card bg-dark text-white shadow-lg registro-card">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <img src="assets/images/logoumg2.png" alt="UMG Logo" width="80" class="mb-3">
        <h2 class="fw-bold">Crear Cuenta</h2>
        <p class="text-secondary small">Sistema de Gestión Académica</p>
      </div>

      <form (ngSubmit)="registrar()" #registroForm="ngForm">
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label text-secondary">Nombre</label>
            <input type="text" class="form-control bg-secondary text-white border-0"
              placeholder="Tu nombre"
              [(ngModel)]="user.nombre" name="nombre" required />
          </div>
          <div class="col-md-6">
            <label class="form-label text-secondary">Apellido</label>
            <input type="text" class="form-control bg-secondary text-white border-0"
              placeholder="Tu apellido"
              [(ngModel)]="user.apellido" name="apellido" required />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label text-secondary">Correo electrónico</label>
          <input type="email" class="form-control bg-secondary text-white border-0"
            placeholder="usuario@correo.com"
            [(ngModel)]="user.email" name="email" required />
        </div>

        <div class="mb-3">
          <label class="form-label text-secondary">Teléfono</label>
          <input type="tel" class="form-control bg-secondary text-white border-0"
            placeholder="12345678 (8 dígitos)"
            [(ngModel)]="user.telefono" name="telefono" required />
        </div>

        <div class="mb-4">
          <label class="form-label text-secondary">Contraseña</label>
          <div class="input-group">
            <input [type]="showPassword ? 'text' : 'password'"
              class="form-control bg-secondary text-white border-0"
              placeholder="••••••••"
              [(ngModel)]="user.password" name="password" required />
            <button type="button" class="btn btn-outline-secondary"
              (click)="togglePasswordVisibility()" tabindex="-1">
              <i [ngClass]="showPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
            </button>
          </div>
          <small class="text-secondary">Mín. 6 caracteres: mayúsculas, minúsculas, número y carácter especial.</small>
        </div>

        <div *ngIf="error" class="alert alert-danger py-2 small">{{ error }}</div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'Registrando...' : 'Crear Cuenta' }}
        </button>
      </form>

      <p class="text-center text-secondary small mt-4 mb-0">
        ¿Ya tienes una cuenta?
        <a routerLink="/login" class="text-primary text-decoration-none">Inicia sesión aquí</a>
      </p>
    </div>
  </div>
</div>
