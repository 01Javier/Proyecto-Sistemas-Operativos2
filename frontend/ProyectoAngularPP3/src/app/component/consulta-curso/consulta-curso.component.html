<div class="container mt-4 mb-5">
  <div class="card bg-dark text-white shadow-sm">
    <div class="card-header border-0 text-center">
      <h2 class="mb-0">Listado de Cursos</h2>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-secondary text-center">
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Catedrático</th>
              <th>Alumnos</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let curso of cursos">
              <td>{{ curso.id }}</td>
              <td>{{ curso.name }}</td>
              <td>{{ curso.catedratico.nombre }} {{ curso.catedratico.apellido }}</td>
              <td>
                <ul class="mb-0">
                  <li *ngFor="let alumno of curso.alumnos">
                    {{ alumno.nombre }} {{ alumno.apellido }}
                  </li>
                </ul>
              </td>
              <td class="text-center">
                <button (click)="selectEdit(curso)" class="btn btn-warning btn-sm hover-outline-warning me-1">Editar</button>
                <button (click)="deleteCurso(curso)" class="btn btn-danger btn-sm hover-outline-danger">Borrar</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
