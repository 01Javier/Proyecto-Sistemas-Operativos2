<div class="container mt-4 mb-5">
  <div class="card bg-dark text-white shadow-sm">
    <div class="card-header border-0 text-center">
      <h2 class="mb-0">Mi Curso</h2>
    </div>
    <div class="card-body p-0">
      <div *ngIf="cursos.length === 0" class="text-center text-secondary py-5">
        <p>No estás inscrito en ningún curso actualmente.</p>
      </div>
      <div class="table-responsive" *ngIf="cursos.length > 0">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-secondary text-center">
            <tr>
              <th>ID</th>
              <th>Nombre del Curso</th>
              <th>Catedrático</th>
              <th>Compañeros</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let curso of cursos">
              <td class="text-center">{{ curso.id }}</td>
              <td>{{ curso.name }}</td>
              <td>{{ curso.catedratico.nombre }} {{ curso.catedratico.apellido }}</td>
              <td>
                <ul class="mb-0 ps-3">
                  <li *ngFor="let alumno of curso.alumnos">
                    {{ alumno.nombre }} {{ alumno.apellido }}
                  </li>
                </ul>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
