<div class="container mt-4 mb-5">
  <div class="card bg-dark text-white shadow-sm">
    <div class="card-header border-0 text-center">
      <h2 class="mb-0">Listado de Usuarios</h2>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-secondary text-center">
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Apellido</th>
              <th>Email</th>
              <th>Teléfono</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let user of users">
              <td>{{ user.id }}</td>
              <td>{{ user.nombre }}</td>
              <td>{{ user.apellido }}</td>
              <td>{{ user.email }}</td>
              <td>{{ user.telefono }}</td>
              <td class="text-center">
                <button (click)="selectEdit(user)" class="btn btn-warning btn-sm hover-outline-warning me-1">Editar</button>
                <button (click)="deleteUser(user)" class="btn btn-danger btn-sm hover-outline-danger">Borrar</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
