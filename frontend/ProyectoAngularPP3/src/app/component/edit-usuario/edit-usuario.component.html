<div class="container mt-4 mb-5">
  <div class="card shadow">
    <div class="card-header bg-dark text-white text-center">
      <h2 class="mb-0">Modificar Usuario</h2>
    </div>
    <div class="card-body">
      <form class="needs-validation" novalidate>
        <div class="row g-3">
          <div class="col-md-4">
            <label for="id" class="form-label">ID del Usuario:</label>
            <input [ngModel]="user.id" type="text" name="id" id="id" class="form-control" placeholder="ID" disabled required />
            <div class="invalid-feedback">Este campo es obligatorio.</div>
          </div>

          <div class="col-md-4">
            <label for="nombre" class="form-label">Nombre:</label>
            <input [(ngModel)]="user.nombre" type="text" name="nombre" id="nombre" #myFocus class="form-control" placeholder="Ingrese nombre" required />
            <div class="invalid-feedback">Por favor, ingrese el nombre.</div>
          </div>

          <div class="col-md-4">
            <label for="apellido" class="form-label">Apellido:</label>
            <input [(ngModel)]="user.apellido" type="text" name="apellido" id="apellido" class="form-control" placeholder="Ingrese apellido" required />
            <div class="invalid-feedback">Por favor, ingrese el apellido.</div>
          </div>

          <div class="col-md-6">
            <label for="email" class="form-label">Correo Electrónico:</label>
            <input [(ngModel)]="user.email" type="email" name="email" id="email" class="form-control" placeholder="ejemplo@correo.com"
            required pattern="[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$">
            <div class="invalid-feedback">Ingrese un correo electrónico válido.</div>
          </div>

          <div class="col-md-6">
            <label for="telefono" class="form-label">Teléfono:</label>
            <input [(ngModel)]="user.telefono" type="text" name="telefono" id="telefono" class="form-control" placeholder="Ingrese teléfono" required pattern="^[0-9]{8}$" />
            <div class="invalid-feedback">Ingrese un teléfono válido (mínimo 8 dígitos).</div>
          </div>

          <div class="col-md-6">
            <label for="password" class="form-label">Contraseña:</label>
            <div class="input-group">
              <input [(ngModel)]="user.password" [type]="showPassword ? 'text' : 'password'" name="password" id="password"
                class="form-control" placeholder="Ingrese contraseña" required minlength="6"
                pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{6,100}$" />
              <button type="button" class="btn btn-outline-secondary" (click)="togglePasswordVisibility()" tabindex="-1">
                <i [ngClass]="showPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
              </button>
            </div>
            <div class="invalid-feedback">Ingrese una contraseña válida (mínimo 6 caracteres, incluyendo mayúsculas, minúsculas, número y símbolo).</div>
          </div>
        </div>

        <div class="mt-4 text-center">
          <button (click)="editUser(user)" type="button" class="btn btn-success btn-sm hover-outline-warning me-1">Guardar</button>
          <button (click)="Cancel()" type="button" class="btn btn-danger btn-sm hover-outline-danger">Cancelar</button>
        </div>
      </form>
    </div>
  </div>
</div>
